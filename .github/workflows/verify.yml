name: Verify Commit
on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest

    # CRITICAL: Give GitHub the required permissions to sign your files
    permissions:
        id-token: write
        contents: write # to grant action can create a release.
        attestations: write

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3

      - name: Install modules
        run: npm install

      - name: Run build
        run: npm run build

      - name: Run TypeScript compiler ESLint
        run: npm run lint

      - name: Run Jest
        run: npm run test

      - name: Get Version
        id: get_version
        run: |
            VERSION=$(jq -r .version manifest.json)
            echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Archive verified build
        uses: actions/upload-artifact@v4.6.2
        with:
          name: dist-verified
          overwrite: true
          path: |
            main.js
            manifest.json
            styles.css


        # 6. Generate the cryptographic attestations for your built files
      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
            subject-path: |
                main.js
                manifest.json
                styles.css

          # 7. Automatically create a GitHub Release
      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Only release on main
        uses: softprops/action-gh-release@v2
        with:
            tag_name: ${{ steps.get_version.outputs.version }}
            name: Release ${{ steps.get_version.outputs.version }}
            generate_release_notes: true
            files: |
                main.js
                manifest.json
                styles.css
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
